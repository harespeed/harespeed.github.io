<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人主页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 2rem;
        }
        .social-links {
            margin-top: 2rem;
        }
        .social-links a {
            color: #333;
            text-decoration: none;
            margin: 0 10px;
        }
        .social-links a:hover {
            color: #0077b5;
        }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的个人主页</h1>
    </header>
    <div class="container">
        <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=professional%20portrait%20photo%20of%20a%20software%20developer&image_size=square" alt="个人头像" class="profile-img">
        <h2>关于我</h2>
        <p>我是一名开发者，热爱编程和技术。这里是我的个人主页，记录我的学习和工作经历。</p>
        <h2>技能</h2>
        <ul>
            <li>前端开发：HTML, CSS, JavaScript</li>
            <li>后端开发：Python, Node.js</li>
            <li>版本控制：Git, GitHub</li>
        </ul>
        <h2>项目</h2>
        <ul>
            <li><a href="#">项目1</a> - 项目描述</li>
            <li><a href="#">项目2</a> - 项目描述</li>
            <li><a href="#">项目3</a> - 项目描述</li>
        </ul>
        <div class="social-links">
            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="https://linkedin.com" target="_blank">LinkedIn</a>
            <a href="https://twitter.com" target="_blank">Twitter</a>
        </div>
    </div>
</body>
</html>
